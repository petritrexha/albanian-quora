apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        # CORRECTED IMAGE URL
        image: albanianquoraregistry123.azurecr.io/albanian-quora-fe:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80

